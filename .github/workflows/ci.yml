name: CI

# H2 (tests pass before merge) + H3 (no committed secrets). Runs on every PR to
# main and on pushes to main. Branch protection requiring this check is a human
# chore (C4) configured once the GitHub remote exists.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Secret-scanner selftest (H3 matcher)
        run: python scripts/check_no_secrets.py --selftest

      - name: Secret scan (H3 — SPEC §9)
        run: python scripts/check_no_secrets.py

      - name: Tests (H2)
        run: pytest -q
