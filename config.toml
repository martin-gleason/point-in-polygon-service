# Service configuration — layers (F2) and, later, geocoder providers (F3/F5).
#
# Layer paths are resolved relative to THIS file's directory. The default
# install ships data/layers.gpkg (built by scripts/build_data.py, F1).
#
# Override the config location with the PIP_CONFIG environment variable.

[[layers]]
id = "police_districts"
name = "Chicago Police Districts"
path = "data/layers.gpkg"
layer = "police_districts"
attributes = ["dist_num", "dist_name"]
source = "City of Chicago Data Portal, dataset 24zt-jpfn (Boundaries - Police Districts, current)."

[[layers]]
id = "municipalities"
name = "Cook County Municipalities"
path = "data/layers.gpkg"
layer = "municipalities"
attributes = ["muni_name", "agency"]
source = "Cook County GIS, politicalBoundary/MapServer layer 2 (Municipality)."

# Geocoder providers (SPEC §5). The ArcGIS REST adapter (F3) serves modes 1 and
# 2: mode 1 is a public GeocodeServer (default below); mode 2 points base_url at
# a private/internal server and sets token_env to the NAME of the env var
# holding its token (never the value — D2, §9). Provider selection and the
# fallback chain (F5) consume these entries; F3 constructs the adapter from one.

[[geocoders]]
id = "cook_county_arcgis"
type = "arcgis_rest"
base_url = "https://gis.cookcountyil.gov/traditional/rest/services/AddressLocator/CookAddressComposite/GeocodeServer"
timeout = 10.0
min_score = 0.0
# token_env = "COOK_GEOCODER_TOKEN"   # uncomment only for a secured server (mode 2)

# US Census onelineaddress — free, no key, US-wide (SPEC §5 mode 1). The
# fallback after the county locator: national coverage where Cook County's
# locator has none.
[[geocoders]]
id = "census"
type = "census"

# The default fallback chain (F5, D7): try the county ArcGIS locator first, fall
# through to Census ONLY on a transport failure (timeout/5xx) — an authoritative
# "no match" from the first provider stops the chain (mixing providers makes
# D6 scores incomparable). `default = true` makes this the provider used when a
# request names none; `?provider=cook_county_arcgis` still targets one directly.
[[geocoders]]
id = "default"
type = "chain"
providers = ["cook_county_arcgis", "census"]
default = true

# ---- Opt-in providers (uncomment + configure) --------------------------------
# Nominatim (SPEC §5 mode 2). The PUBLIC instance is opt-in and NOT in the
# default chain — a shared public instance is not for service traffic (≤1 req/s
# policy). Fully supported when self-hosted: point base_url at your instance.
# user_agent is REQUIRED by the OSM usage policy.
# [[geocoders]]
# id = "nominatim"
# type = "nominatim"
# user_agent = "point-in-polygon-service (you@agency.gov)"
# base_url = "https://nominatim.openstreetmap.org"

# Fully-offline / air-gapped (SPEC §5 mode 3). Matches against a local
# address-point GeoPackage — no server, no internet. Build the layer locally:
#   python scripts/build_data.py --address-points
